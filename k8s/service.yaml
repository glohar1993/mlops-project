apiVersion: v1
kind: Service
metadata:
  name: flask-service
spec:
  # ClusterIP — traffic enters via ALB Ingress, not directly via LoadBalancer
  # ALB handles: TLS termination, auth (Cognito/OIDC), rate-limiting (WAF)
  type: ClusterIP
  selector:
    app: flask-app
  ports:
    - port: 80
      targetPort: 5001
