apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-container
          image: 824033490704.dkr.ecr.us-east-2.amazonaws.com/mlops-flask-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
