# =============================================================
# PIPELINE 1: CI/CD Pipeline (Serving App)
# Trigger: code push → Jenkins → builds image → deploys here
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  labels:
    pipeline: "1-cicd"
    role: "serving"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
        pipeline: "1-cicd"
    spec:
      containers:
        - name: flask-container
          image: mlops-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          env:
            - name: PIPELINE
              value: "serving"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  labels:
    pipeline: "1-cicd"
spec:
  type: NodePort
  selector:
    app: flask-app
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30080
