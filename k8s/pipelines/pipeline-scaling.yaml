# ============================================================
# Production Scaling — HPA only
# Deployment spec is managed by ArgoCD via k8s/deployment.yaml
# Jenkins applies this file directly via kubectl apply
# ============================================================
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flask-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flask-deployment
  minReplicas: 2
  maxReplicas: 2  # Capped at 2 for t3.medium cluster capacity; increase when adding nodes
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60   # scale up when avg CPU > 60%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70   # scale up when avg memory > 70%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # wait 30s before scaling up
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120  # wait 2min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
