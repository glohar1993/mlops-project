# ============================================================
# External Secrets Operator — Sync AWS Secrets Manager → K8s Secrets
#
# Architecture:
#   AWS Secrets Manager (mlops/production/secrets)
#     └── ExternalSecret (ESO controller)
#           └── K8s Secret (mlops-secrets) — consumed by all pods
#
# This replaces manual `kubectl create secret` in Jenkinsfile.
# Secrets rotate automatically when AWS SM is updated (refreshInterval).
#
# Prerequisites:
#   kubectl apply -f https://github.com/external-secrets/external-secrets/releases/latest/download/install.yaml
#   OR via Helm:
#     helm repo add external-secrets https://charts.external-secrets.io
#     helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
# ============================================================

---
# SecretStore: defines HOW ESO authenticates to AWS Secrets Manager
# Uses pod-level IRSA (IAM Role for Service Account) — no static keys
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa

---
# ServiceAccount with IRSA annotation
# The IAM role ARN must have secretsmanager:GetSecretValue on mlops/production/*
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::824033490704:role/mlops-external-secrets-role"

---
# ExternalSecret: pulls every key from AWS SM → K8s Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mlops-external-secret
  namespace: default
spec:
  refreshInterval: 1h          # re-sync every hour; pod rolling restart picks up changes
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: mlops-secrets          # this is the K8s Secret consumed by all deployments
    creationPolicy: Owner        # ESO owns the secret; deleting ExternalSecret deletes it
  data:
    # Each item: key in K8s Secret ← remoteRef in AWS SM
    - secretKey: MLFLOW_TRACKING_URI
      remoteRef:
        key: mlops/production/secrets
        property: MLFLOW_TRACKING_URI

    - secretKey: MLFLOW_MODEL_NAME
      remoteRef:
        key: mlops/production/secrets
        property: MLFLOW_MODEL_NAME

    - secretKey: AWS_DEFAULT_REGION
      remoteRef:
        key: mlops/production/secrets
        property: AWS_DEFAULT_REGION

    - secretKey: S3_ARTIFACTS_BUCKET
      remoteRef:
        key: mlops/production/secrets
        property: S3_ARTIFACTS_BUCKET

    - secretKey: ENVIRONMENT
      remoteRef:
        key: mlops/production/secrets
        property: ENVIRONMENT

    - secretKey: SLACK_WEBHOOK_URL
      remoteRef:
        key: mlops/production/secrets
        property: SLACK_WEBHOOK_URL

    - secretKey: PAGERDUTY_ROUTING_KEY
      remoteRef:
        key: mlops/production/secrets
        property: PAGERDUTY_ROUTING_KEY

    - secretKey: AIRFLOW_API_URL
      remoteRef:
        key: mlops/production/secrets
        property: AIRFLOW_API_URL

    - secretKey: AIRFLOW_USER
      remoteRef:
        key: mlops/production/secrets
        property: AIRFLOW_USER

    - secretKey: AIRFLOW_PASSWORD
      remoteRef:
        key: mlops/production/secrets
        property: AIRFLOW_PASSWORD
