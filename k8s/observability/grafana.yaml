---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-service:9090
        isDefault: true
        access: proxy

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  dashboard.yaml: |
    apiVersion: 1
    providers:
      - name: 'MLOps Dashboards'
        folder: 'MLOps'
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mlops
data:
  mlops-dashboard.json: |
    {
      "title": "MLOps Production Dashboard",
      "uid": "mlops-prod",
      "panels": [
        {
          "id": 1,
          "title": "Total Predictions",
          "type": "stat",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "targets": [{"expr": "sum(ml_predictions_total)", "legendFormat": "Total"}]
        },
        {
          "id": 2,
          "title": "Predictions by Outcome",
          "type": "piechart",
          "gridPos": {"x": 6, "y": 0, "w": 8, "h": 8},
          "targets": [{"expr": "ml_predictions_total", "legendFormat": "{{result}}"}]
        },
        {
          "id": 3,
          "title": "Prediction Errors",
          "type": "stat",
          "gridPos": {"x": 14, "y": 0, "w": 5, "h": 4},
          "targets": [{"expr": "ml_prediction_errors_total", "legendFormat": "Errors"}]
        },
        {
          "id": 4,
          "title": "Model Loaded Status",
          "type": "stat",
          "gridPos": {"x": 19, "y": 0, "w": 5, "h": 4},
          "targets": [{"expr": "ml_model_loaded", "legendFormat": "Model Status"}]
        },
        {
          "id": 5,
          "title": "Prediction Latency (p99)",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 8, "w": 12, "h": 8},
          "targets": [{"expr": "histogram_quantile(0.99, rate(ml_prediction_duration_seconds_bucket[1m]))", "legendFormat": "p99 latency"}]
        },
        {
          "id": 6,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 8, "w": 12, "h": 8},
          "targets": [{"expr": "rate(flask_http_request_total[1m])", "legendFormat": "{{method}} {{status}}"}]
        },
        {
          "id": 7,
          "title": "HTTP Request Duration",
          "type": "timeseries",
          "gridPos": {"x": 0, "y": 16, "w": 12, "h": 8},
          "targets": [{"expr": "histogram_quantile(0.95, rate(flask_http_request_duration_seconds_bucket[5m]))", "legendFormat": "p95 HTTP latency"}]
        },
        {
          "id": 8,
          "title": "High Efficiency Predictions Rate",
          "type": "timeseries",
          "gridPos": {"x": 12, "y": 16, "w": 12, "h": 8},
          "targets": [{"expr": "rate(ml_predictions_total{result='High'}[5m])", "legendFormat": "High/s"}]
        }
      ],
      "time": {"from": "now-30m", "to": "now"},
      "refresh": "10s",
      "schemaVersion": 38
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "mlops123"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - name: datasource-config
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasource-config
          configMap:
            name: grafana-datasource
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-json
          configMap:
            name: grafana-dashboard-mlops

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
