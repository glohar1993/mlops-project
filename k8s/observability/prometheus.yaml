---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: mlops-eks
        environment: production

    # AlertManager integration — where Prometheus sends fired alerts
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager-service:9093']
          timeout: 10s

    # Load all rule files from /etc/prometheus/rules/
    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # MLOps Flask app — primary metrics source
      # Service port is 80 (targetPort 5001) — must use 80, not 5001
      - job_name: 'mlops-flask-app'
        static_configs:
          - targets: ['flask-service:80']
        metrics_path: '/metrics'
        scrape_interval: 15s

      # AlertManager — enables AlertManagerDown rule
      - job_name: 'alertmanager'
        static_configs:
          - targets: ['alertmanager-service:9093']
        metrics_path: '/metrics'

      # Loki — log pipeline health
      - job_name: 'loki'
        static_configs:
          - targets: ['loki.logging.svc.cluster.local:3100']
        metrics_path: '/metrics'

      # Promtail — log shipping health
      - job_name: 'promtail'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['logging']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: promtail
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: '$1:9080'

---
# Watchdog / Dead Man's Switch + AlertManager health
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-watchdog-rules
data:
  watchdog_rules.yml: |
    groups:
      - name: mlops.watchdog
        interval: 60s
        rules:

          # ── Dead Man's Switch ─────────────────────────────────────
          # This alert ALWAYS fires. Its presence in Slack confirms monitoring is alive.
          # If #all-mlops goes quiet for >10m → Prometheus or AlertManager is down.
          - alert: Watchdog
            expr: vector(1)
            labels:
              severity: info
              team: mlops
              layer: L0-Observability
            annotations:
              summary: "Prometheus heartbeat — monitoring operational"
              description: >
                Always-on alert. Confirms Prometheus is running and AlertManager
                is receiving alerts. Silence = monitoring stack is down.

          # ── AlertManager connectivity ─────────────────────────────
          - alert: AlertManagerDown
            expr: absent(up{job="alertmanager"}) or up{job="alertmanager"} == 0
            for: 2m
            labels:
              severity: critical
              service: observability
              layer: L0-Observability
            annotations:
              summary: "AlertManager unreachable — alerts NOT being delivered"
              description: >
                Prometheus cannot reach AlertManager at alertmanager-service:9093.
                All firing alerts are queued but NOT sent to Slack. Fix immediately.

          # ── Loki log pipeline health ──────────────────────────────
          - alert: LokiDown
            expr: absent(up{job="loki"}) or up{job="loki"} == 0
            for: 3m
            labels:
              severity: warning
              service: observability
              layer: L0-Observability
            annotations:
              summary: "Loki log aggregation is down"
              description: >
                Loki is unreachable. Pod logs are not being stored.
                Check: kubectl get pods -n logging

          # ── Prometheus storage pressure ───────────────────────────
          - alert: PrometheusStorageFull
            expr: |
              (
                prometheus_tsdb_storage_blocks_bytes
                / (prometheus_tsdb_storage_blocks_bytes + prometheus_tsdb_wal_storage_size_bytes + 1)
              ) > 0.85
            for: 10m
            labels:
              severity: warning
              service: observability
              layer: L0-Observability
            annotations:
              summary: "Prometheus TSDB storage at {{ $value | humanizePercentage }}"
              description: >
                TSDB is {{ $value | humanizePercentage }} full. 7d retention should auto-expire
                old blocks. If this persists, reduce retention or expand storage.

          # ── Prometheus rule evaluation lag ───────────────────────
          - alert: PrometheusRuleEvaluationSlow
            expr: |
              prometheus_rule_group_last_duration_seconds
              > prometheus_rule_group_interval_seconds
            for: 5m
            labels:
              severity: warning
              service: observability
              layer: L0-Observability
            annotations:
              summary: "Prometheus rule group {{ $labels.rule_group }} evaluation lagging"
              description: >
                Rule group {{ $labels.rule_group }} takes {{ $value | humanizeDuration }}
                to evaluate but interval is shorter. Alert firing may be delayed.

---
# SLO Recording Rules
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-slo-rules
data:
  slo_rules.yml: |
    groups:
      - name: mlops.slo.rules
        interval: 30s
        rules:

          - record: slo:prediction_latency_p95_ms
            expr: >
              histogram_quantile(0.95,
                rate(ml_prediction_duration_seconds_bucket[5m])
              ) * 1000

          - record: slo:prediction_latency_p99_ms
            expr: >
              histogram_quantile(0.99,
                rate(ml_prediction_duration_seconds_bucket[5m])
              ) * 1000

          - record: slo:latency_compliance
            expr: >
              (
                histogram_quantile(0.95,
                  rate(ml_prediction_duration_seconds_bucket[5m])
                ) * 1000 < 500
              ) or vector(0)

          - record: slo:prediction_error_rate_pct
            expr: >
              rate(ml_prediction_errors_total[5m])
              /
              (rate(ml_predictions_total[5m]) + rate(ml_prediction_errors_total[5m]) + 0.0001)
              * 100

          - record: slo:error_rate_compliance
            expr: >
              (
                rate(ml_prediction_errors_total[5m])
                /
                (rate(ml_predictions_total[5m]) + rate(ml_prediction_errors_total[5m]) + 0.0001)
                * 100 < 1.0
              ) or vector(0)

          - record: slo:prediction_throughput_rps
            expr: rate(ml_predictions_total[1m])

          - record: slo:error_burn_rate_fast
            expr: >
              rate(ml_prediction_errors_total[5m])
              /
              (rate(ml_predictions_total[5m]) + 0.0001)

          - record: slo:error_burn_rate_slow
            expr: >
              rate(ml_prediction_errors_total[1h])
              /
              (rate(ml_predictions_total[1h]) + 0.0001)

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
            - "--web.external-url=http://18.189.188.181:30090"
          ports:
            - containerPort: 9090
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config-volume
              mountPath: /etc/prometheus
            - name: rules-volume
              mountPath: /etc/prometheus/rules
      volumes:
        - name: config-volume
          configMap:
            name: prometheus-config
        # Projected volume — merges ALL rule ConfigMaps into /etc/prometheus/rules/
        - name: rules-volume
          projected:
            sources:
              - configMap:
                  name: prometheus-alert-rules
              - configMap:
                  name: prometheus-slo-rules
              - configMap:
                  name: prometheus-watchdog-rules
              - configMap:
                  name: prometheus-alert-rules-extended

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090
