# =============================================================
# Fluent Bit — EKS to CloudWatch Logs
# =============================================================
# Ships all pod stdout/stderr logs to CloudWatch Logs.
# JSON-structured logs from src/logger.py are parsed automatically.
#
# Log groups created:
#   /eks/mlops-cluster/application   — all pod logs
#   /eks/mlops-cluster/flask-app     — Flask-only filtered logs
#
# Prerequisites:
#   - EKS node IAM role needs CloudWatchAgentServerPolicy attached
#   - Run: kubectl apply -f this file
# =============================================================

# ── Namespace ──────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: amazon-cloudwatch
  labels:
    name: amazon-cloudwatch

---
# ── ServiceAccount + RBAC ─────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-role
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/logs", "nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-role
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: amazon-cloudwatch

---
# ── ConfigMap — Fluent Bit Configuration ──────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: amazon-cloudwatch
  labels:
    k8s-app: fluent-bit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    # ── Input: Tail pod logs ─────────────────────────────────
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # ── Filter: Enrich with K8s metadata ────────────────────
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    # ── Filter: Parse JSON logs from mlops-flask-app ─────────
    [FILTER]
        Name    parser
        Match   kube.*flask*
        Key_Name log
        Parser  json_log
        Reserve_Data True

    # ── Output: All logs → CloudWatch /application ───────────
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*
        region              us-east-2
        log_group_name      /eks/mlops-cluster/application
        log_stream_prefix   ${HOSTNAME}-
        auto_create_group   true
        log_retention_days  30

    # ── Output: Flask logs → dedicated log group ─────────────
    [OUTPUT]
        Name                cloudwatch_logs
        Match               kube.*flask*
        region              us-east-2
        log_group_name      /eks/mlops-cluster/flask-app
        log_stream_prefix   flask-
        auto_create_group   true
        log_retention_days  90

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        json_log
        Format      json
        Time_Key    timestamp
        Time_Format %Y-%m-%dT%H:%M:%S.%f%z

---
# ── DaemonSet — runs on every node ────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: amazon-cloudwatch
  labels:
    k8s-app: fluent-bit
    version:  v1
spec:
  selector:
    matchLabels:
      k8s-app: fluent-bit
  template:
    metadata:
      labels:
        k8s-app: fluent-bit
        version:  v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "2020"
        prometheus.io/path:   "/api/v1/metrics/prometheus"
    spec:
      serviceAccountName: fluent-bit
      terminationGracePeriodSeconds: 10

      tolerations:
        # Run on all nodes including master
        - key:    node-role.kubernetes.io/master
          effect: NoSchedule

      containers:
        - name:  fluent-bit
          image: public.ecr.aws/aws-observability/aws-for-fluent-bit:stable
          imagePullPolicy: Always

          env:
            - name: AWS_REGION
              value: "us-east-2"
            - name: CLUSTER_NAME
              value: "mlops-cluster"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              cpu:    "50m"
              memory: "64Mi"
            limits:
              cpu:    "200m"
              memory: "256Mi"

          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc/

          ports:
            - name:          metrics
              containerPort: 2020

      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
