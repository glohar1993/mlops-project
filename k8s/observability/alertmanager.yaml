# ============================================================
# Alertmanager — fires alerts when Prometheus rules trigger
# In production: routes to Slack / PagerDuty / Email
# ============================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config-template
data:
  # Template file — ${SLACK_WEBHOOK_URL} is substituted at pod startup
  # by the init container using envsubst. The rendered file is written
  # to an emptyDir volume that the main container reads.
  alertmanager.yml.tmpl: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 1h
      receiver: 'slack-alerts'
      routes:
        - match:
            severity: critical
          receiver: 'slack-alerts'
        - match:
            severity: warning
          receiver: 'slack-alerts'

    receivers:
      - name: 'slack-alerts'
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#mlops-alerts'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Details:* {{ .Annotations.description }}
                *Severity:* {{ .Labels.severity }}
              {{ end }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
data:
  mlops_rules.yml: |
    groups:
      - name: mlops.production.rules
        interval: 30s
        rules:

          # ALERT: Model drift is CRITICAL
          - alert: ModelDriftCritical
            expr: ml_drift_status == 2
            for: 1m
            labels:
              severity: critical
              service: mlops
              pipeline: drift-detection
            annotations:
              summary: "🚨 CRITICAL model drift detected"
              description: "ml_drift_status is CRITICAL. PSI={{ $value }}. Retraining pipeline should trigger."

          # ALERT: Model drift WARNING
          - alert: ModelDriftWarning
            expr: ml_drift_status == 1
            for: 2m
            labels:
              severity: warning
              service: mlops
              pipeline: drift-detection
            annotations:
              summary: "⚠️ Model drift WARNING"
              description: "Drift PSI is above warning threshold. Monitor closely."

          # ALERT: ML model not loaded
          - alert: ModelNotLoaded
            expr: ml_model_loaded == 0
            for: 1m
            labels:
              severity: critical
              service: mlops
            annotations:
              summary: "🚨 ML model not loaded"
              description: "The ML model failed to load. App cannot make predictions."

          # ALERT: High prediction error rate
          - alert: HighPredictionErrorRate
            expr: rate(ml_prediction_errors_total[5m]) > 0.1
            for: 2m
            labels:
              severity: critical
              service: mlops
            annotations:
              summary: "🚨 High prediction error rate"
              description: "More than 10% of predictions are erroring. Check input data."

          # ALERT: Flask app down
          - alert: FlaskAppDown
            expr: up{job="mlops-flask-app"} == 0
            for: 1m
            labels:
              severity: critical
              service: mlops
            annotations:
              summary: "🚨 Flask serving app is DOWN"
              description: "Prometheus cannot scrape the Flask app. Pod may be crashed."

          # ALERT: Prediction latency too high
          - alert: HighPredictionLatency
            expr: histogram_quantile(0.99, rate(ml_prediction_duration_seconds_bucket[5m])) > 1.0
            for: 3m
            labels:
              severity: warning
              service: mlops
            annotations:
              summary: "⚠️ High prediction latency (p99 > 1s)"
              description: "p99 prediction latency is above 1 second. Model may need optimization."

          # ALERT: Retraining failed (rolled back)
          - alert: RetrainingFailed
            expr: ml_retraining_last_success == 0
            for: 1m
            labels:
              severity: warning
              service: mlops
              pipeline: retraining
            annotations:
              summary: "⚠️ Last model retraining was rolled back"
              description: "New model performed worse than old model. Rollback occurred."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      # Init container renders the config template by substituting
      # ${SLACK_WEBHOOK_URL} from the mlops-secrets Secret.
      initContainers:
        - name: config-gen
          image: busybox:1.36
          command:
            - sh
            - -c
            - sed "s|\${SLACK_WEBHOOK_URL}|$SLACK_WEBHOOK_URL|g" /tmpl/alertmanager.yml.tmpl > /etc/alertmanager/alertmanager.yml
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: SLACK_WEBHOOK_URL
          volumeMounts:
            - name: config-template
              mountPath: /tmpl
            - name: config-rendered
              mountPath: /etc/alertmanager
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/alertmanager
      volumes:
        - name: config-template
          configMap:
            name: alertmanager-config-template
        - name: config-rendered
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-service
spec:
  type: NodePort
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
      nodePort: 30093
