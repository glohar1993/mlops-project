# ============================================================
# AlertManager — Production-grade routing, inhibition, watchdog
# ============================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config-template
data:
  alertmanager.yml.tmpl: |
    global:
      resolve_timeout: 5m

    # ── Inhibition Rules ──────────────────────────────────────────
    # If a "source" alert fires, suppress matching "target" alerts.
    # Prevents alert storms where one root cause fires 10 alerts.
    inhibit_rules:
      # Flask down → suppress model quality / drift / retrain alerts
      # Rationale: no serving layer = no predictions = those alerts are noise
      - source_match:
          alertname: FlaskAppDown
          severity: critical
        target_match_re:
          alertname: 'ModelDrift.*|HighPrediction.*|RetrainingFailed|LowPredictionConfidence|ModelAccuracy.*|DagRun.*'
        equal: ['service']

      # Model not loaded → suppress drift and retraining alerts
      - source_match:
          alertname: ModelNotLoaded
          severity: critical
        target_match_re:
          alertname: 'ModelDrift.*|RetrainingFailed|RetrainingLoop.*'
        equal: ['service']

      # Critical already firing → suppress warning for same alert family
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname', 'service']

    # ── Routing Tree ──────────────────────────────────────────────
    route:
      # Root: catch-all (P2 warnings, batched)
      receiver: 'slack-warnings'
      group_by: ['alertname', 'service', 'layer']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

      routes:
        # Watchdog heartbeat — always fires, silence means monitoring is down
        - matchers:
            - alertname = "Watchdog"
          receiver: 'slack-watchdog'
          group_wait: 0s
          repeat_interval: 5m
          continue: false

        # P0/P1 Critical — immediate page, loud, short repeat
        - matchers:
            - severity = "critical"
          receiver: 'slack-critical'
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 15m
          continue: false

        # P2 Warning — batched, less frequent
        - matchers:
            - severity = "warning"
          receiver: 'slack-warnings'
          group_wait: 2m
          group_interval: 10m
          repeat_interval: 2h
          continue: false

        # Info / DAG success — informational only
        - matchers:
            - severity = "info"
          receiver: 'slack-info'
          group_wait: 10s
          repeat_interval: 1h

    # ── Receivers ─────────────────────────────────────────────────
    receivers:
      # P0/P1 Critical — rotating_light, instant, every 15m until resolved
      - name: 'slack-critical'
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#all-mlops'
            send_resolved: true
            icon_emoji: ':rotating_light:'
            username: 'MLOps CRITICAL'
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            title: '{{ if eq .Status "firing" }}🚨 CRITICAL{{ else }}✅ RESOLVED{{ end }} — {{ .CommonLabels.alertname }}'
            title_link: 'http://18.189.188.181:30090/alerts'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }}
              *Summary:* {{ .Annotations.summary }}
              *Details:* {{ .Annotations.description }}
              *Layer:* {{ .Labels.layer }}
              *Started:* {{ .StartsAt.Format "2006-01-02 15:04 UTC" }}
              {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
              {{ end }}
            actions:
              - type: button
                text: 'Grafana Dashboard'
                url: 'http://18.189.188.181:30030'
              - type: button
                text: 'Prometheus Alerts'
                url: 'http://18.189.188.181:30090/alerts'
              - type: button
                text: 'Airflow UI'
                url: 'http://a86b97ed8436c4b9896b7dd139d26693-2143784381.us-east-2.elb.amazonaws.com:8080'

      # P2 Warning — batched, less noisy
      - name: 'slack-warnings'
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#all-mlops'
            send_resolved: true
            icon_emoji: ':warning:'
            username: 'MLOps Warning'
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
            title: '{{ if eq .Status "firing" }}⚠️ WARNING{{ else }}✅ RESOLVED{{ end }} — {{ .CommonLabels.alertname }}'
            title_link: 'http://18.189.188.181:30090/alerts'
            text: |
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} | *Layer:* {{ .Labels.layer }}
              *Summary:* {{ .Annotations.summary }}
              {{ end }}

      # Watchdog heartbeat — silent success signal, absence = problem
      - name: 'slack-watchdog'
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#all-mlops'
            send_resolved: false
            icon_emoji: ':dog:'
            username: 'Watchdog'
            title: '🐕 Prometheus heartbeat — monitoring alive'
            text: 'All systems operational. {{ now | date "2006-01-02 15:04 UTC" }}'

      # Info — DAG success, low-urgency events
      - name: 'slack-info'
        slack_configs:
          - api_url: '${SLACK_WEBHOOK_URL}'
            channel: '#all-mlops'
            send_resolved: true
            icon_emoji: ':information_source:'
            username: 'MLOps Info'
            color: 'good'
            title: 'ℹ️ {{ .CommonLabels.alertname }}'
            text: |
              {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
    spec:
      initContainers:
        - name: config-gen
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              # envsubst substitutes only listed vars — safe with other ${} in template
              sed "s|\${SLACK_WEBHOOK_URL}|${SLACK_WEBHOOK_URL}|g" \
                /tmpl/alertmanager.yml.tmpl > /etc/alertmanager/alertmanager.yml
              echo "[config-gen] Rendered AlertManager config:"
              grep -E "channel:|receiver:|api_url:|severity" /etc/alertmanager/alertmanager.yml
          env:
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: mlops-secrets
                  key: SLACK_WEBHOOK_URL
          volumeMounts:
            - name: config-template
              mountPath: /tmpl
            - name: config-rendered
              mountPath: /etc/alertmanager
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.31.1
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.external-url=http://18.189.188.181:30093"
          ports:
            - containerPort: 9093
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/alertmanager
      volumes:
        - name: config-template
          configMap:
            name: alertmanager-config-template
        - name: config-rendered
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-service
spec:
  type: NodePort
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
      nodePort: 30093
