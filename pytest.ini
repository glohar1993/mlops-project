[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
    --cov=src
    --cov-report=term-missing
    --cov-fail-under=40
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (requires Flask app)
    e2e: End-to-end tests (requires model artifacts)
    security: Security tests
    governance: Governance tests
    fairness: Fairness / bias tests
    contract: Data contract tests
    slow: Slow tests
